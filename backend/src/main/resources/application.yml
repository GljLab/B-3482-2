server:
  port: 8080

spring:
  application:
    name: clip-hub-backend
  datasource:
    url: jdbc:mysql://${DB_HOST:db}:${DB_PORT:3306}/${DB_NAME:clip_hub_db}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=UTF-8
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:Xy7441015888}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 5000ms
  servlet:
    multipart:
      max-file-size: 512MB
      max-request-size: 512MB

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    banner: false

app:
  jwt:
    secret: ${JWT_SECRET:clip-hub-jwt-secret-must-be-at-least-32-bytes-long-2026}
    expire-seconds: ${JWT_EXPIRE_SECONDS:86400}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3482}
  storage:
    root: ${STORAGE_ROOT:/data}

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n"
  level:
    root: INFO
    com.cliphub: INFO
