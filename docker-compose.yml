services:
  db:
    image: mysql:8.0
    container_name: label-3482-db
    restart: unless-stopped
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: Xy7441015888
      MYSQL_DATABASE: clip_hub_db
      TZ: Asia/Shanghai
    ports:
      - "13482:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-pXy7441015888"]
      interval: 8s
      timeout: 5s
      retries: 12
    networks:
      - app_net

  redis:
    image: redis:7-alpine
    container_name: label-3482-redis
    restart: unless-stopped
    ports:
      - "16382:6379"
    networks:
      - app_net

  backend:
    build:
      context: ./backend
    container_name: label-3482-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: clip_hub_db
      DB_USER: root
      DB_PASSWORD: Xy7441015888
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CORS_ALLOWED_ORIGINS: http://localhost:3482
      STORAGE_ROOT: /data
      JWT_SECRET: clip-hub-jwt-secret-must-be-at-least-32-bytes-long-2026
      JWT_EXPIRE_SECONDS: 86400
    volumes:
      - backend_data:/data
    ports:
      - "8482:8080"
    networks:
      - app_net

  frontend:
    build:
      context: ./frontend
    container_name: label-3482-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3482:80"
    networks:
      - app_net

volumes:
  mysql_data:
  backend_data:

networks:
  app_net:
    driver: bridge
    ipam:
      config:
        - subnet: 10.88.82.0/24
